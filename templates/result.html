<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Result</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">
<div class="card">

<h1>Prediction Result</h1>

<div class="result-meter {% if 'High' in prediction %}danger{% elif 'Medium' in prediction %}medium{% else %}safe{% endif %}">
<p class="result-text">{{ prediction }}</p>
</div>

<a href="/" class="btn-back">Predict Another Patient</a>

</div>
</div>

</body>
</html>
