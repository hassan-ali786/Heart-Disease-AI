<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="container">
<div class="card">

<h1>Prediction Dashboard</h1>

<div class="result-meter 
{% if 'High' in data['prediction'] %}
danger
{% elif 'Medium' in data['prediction'] %}
medium
{% else %}
safe
{% endif %}">
<p class="result-text">{{ data['prediction'] }}</p>
</div>

<canvas id="vitalsChart" width="400" height="200"></canvas>

<a href="/" class="btn-back">Predict Another Patient</a>

<script>
const ctx = document.getElementById('vitalsChart').getContext('2d');
const vitalsChart = new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Resting BP', 'Cholesterol', 'Max Heart Rate', 'Oldpeak'],
        datasets: [{
            label: 'Patient Vitals',
            data: [
                {{ data['trestbps'] }},
                {{ data['chol'] }},
                {{ data['thalach'] }},
                {{ data['oldpeak'] }}
            ],
            backgroundColor: ['#1e3c72','#2a5298','#1e3c72','#2a5298']
        }]
    },
    options: {
        responsive: true,
        scales: {
            y: { beginAtZero: true }
        }
    }
});
</script>

</div>
</div>
</body>
</html>
